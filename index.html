<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#fdf6e3">
    <title>给 Mia 的生日信</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        body {
            background: linear-gradient(135deg, #fdf6e3 0%, #fce4ec 100%);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", serif;
            color: #4a4a4a;
            padding: max(24px, env(safe-area-inset-top)) 16px
                     max(24px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .letter {
            background: white;
            max-width: 520px;
            width: 100%;
            padding: 36px 28px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(217, 79, 112, 0.12);
            line-height: 1.8;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #d94f70;
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .salute {
            font-size: 1.1em;
            margin-bottom: 16px;
        }

        p {
            margin-bottom: 14px;
            font-size: 1em;
        }

        .signature {
            text-align: right;
            margin-top: 28px;
            font-style: italic;
            color: #a76a8a;
        }

        .hint {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed #eedce4;
            font-size: 0.85em;
            color: #999;
        }

        .heart {
            color: #d94f70;
            display: inline-block;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.15); }
        }
    </style>
</head>
<body>
    <div class="letter">
        <h1>🎂 Happy Birthday, Mia!</h1>

        <p class="salute">亲爱的 Mia：</p>

        <p>在你看到这页的时候，你正拿着我亲手做的小玩具——里面的烟花、音乐、小猫 Mochi，每一帧都是为你写的。</p>

        <p>[这里写你想跟 Mia 说的话——一段就好，最多三段。]</p>

        <p>愿你这一年继续被你想要的一切温柔包围。</p>

        <p class="signature">— Zoey<br>2026.09.13</p>

        <p class="hint">把手机贴近玩具，就能再次看到这封信 <span class="heart">♥</span></p>
    </div>
</body>
</html>
